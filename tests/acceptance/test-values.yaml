# Acceptance test overrides.
# These values keep local and CI acceptance runs consistent and self-contained.

tls:
  disabled: true

controller:
  replicas: 2
  config: |
    disable_mlock = true

    listener "tcp" {
      address     = "0.0.0.0:9200"
      purpose     = "api"
      tls_disable = true
    }

    listener "tcp" {
      address     = "0.0.0.0:9201"
      purpose     = "cluster"
    }

    listener "tcp" {
      address     = "0.0.0.0:9203"
      purpose     = "ops"
      tls_disable = true
    }

    controller {
      name = "boundary-controller"
      description = "Boundary Controller running in Kubernetes"
      public_cluster_addr = "{{ printf "%s:9201" (include "boundary.controller.clusterServiceName" .) }}"
      license = "env://BOUNDARY_LICENSE"
      database {
        url = "env://BOUNDARY_PG_URL"
      }
      graceful_shutdown_wait_duration = "10s"
    }

    kms "aead" {
      purpose = "root"
      aead_type = "aes-gcm"
      key       = "8fZBjCUfN0TzjEGLQldGY4+iE9AkOvCfjh7+p0GtRBQ="
      key_id    = "acceptance-root"
    }

    kms "aead" {
      purpose = "worker-auth"
      aead_type = "aes-gcm"
      key       = "GQ7m2L5rWy90P1xvR8wzWQvV54nA9M4V3x3K8Fv5YyQ="
      key_id    = "acceptance-worker-auth"
    }

    kms "aead" {
      purpose = "recovery"
      aead_type = "aes-gcm"
      key       = "L0t7m4mP6jS2hD9Qx1bYf3nV7kR5cW8pE2uA9zN6qHs="
      key_id    = "acceptance-recovery"
    }

    events {
      audit_enabled = false
      observations_enabled = false
      sysevents_enabled = false
      telemetry_enabled = false
      sink "stderr" {
        name = "errors"
        description = "All error events"
        event_types = ["error"]
        format = "hclog-text"
      }
    }

bootstrapAdminAuthMethod:
  waitTimeoutSeconds: 300
