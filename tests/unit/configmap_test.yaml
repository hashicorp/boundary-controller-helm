suite: Controller configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders the controller config and bootstrap script
    set:
      database:
        init:
          enabled: false
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: boundary-controller-config
      - matchRegex:
          path: data["controller.hcl"]
          pattern: disable_mlock = true
      - matchRegex:
          path: data["bootstrap-admin.sh"]
          pattern: Bootstrap admin completed successfully
  - it: renders tpl-expanded TLS mount path in controller config
    set:
      database:
        init:
          enabled: false
      tls:
        mountPath: /custom/tls
    asserts:
      - matchRegex:
          path: data["controller.hcl"]
          pattern: 'tls_cert_file = "/custom/tls/tls.crt"'
      - matchRegex:
          path: data["controller.hcl"]
          pattern: 'tls_key_file  = "/custom/tls/tls.key"'
  - it: applies nameOverride and namespace in configmap metadata
    set:
      database:
        init:
          enabled: false
      nameOverride: custom
      namespace: boundary
    asserts:
      - equal:
          path: metadata.name
          value: custom-config
      - equal:
          path: metadata.namespace
          value: boundary
