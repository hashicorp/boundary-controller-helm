suite: Controller configmap
templates:
  - templates/configmap.yaml
tests:
  - it: renders the controller config without the bootstrap script
    documentIndex: 0
    set:
      database:
        init:
          enabled: false
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: boundary-controller-config
      - matchRegex:
          path: data["controller.hcl"]
          pattern: disable_mlock = true
      - notExists:
          path: data["bootstrap-admin.sh"]
  - it: renders a bootstrap hook config for bootstrap admin installs
    documentIndex: 1
    set:
      database:
        init:
          enabled: false
      bootstrapAdmin:
        enabled: true
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: boundary-controller-bootstrap-hook-config
      - matchRegex:
          path: data["bootstrap-admin.sh"]
          pattern: Bootstrap admin completed successfully
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "0"
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded,hook-failed
  - it: renders the hook config for database init hooks
    documentIndex: 2
    set:
      database:
        init:
          enabled: true
      bootstrapAdmin:
        enabled: true
    asserts:
      - hasDocuments:
          count: 3
      - equal:
          path: metadata.name
          value: boundary-controller-hook-config
      - matchRegex:
          path: data["db-init.sh"]
          pattern: boundary database init
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation,hook-succeeded,hook-failed
  - it: renders default TLS cert and key paths in controller config
    set:
      database:
        init:
          enabled: false
    asserts:
      - matchRegex:
          path: data["controller.hcl"]
          pattern: 'tls_cert_file = "/etc/boundary/tls/tls.crt"'
      - matchRegex:
          path: data["controller.hcl"]
          pattern: 'tls_key_file  = "/etc/boundary/tls/tls.key"'
  - it: applies nameOverride and namespace in configmap metadata
    documentIndex: 0
    set:
      database:
        init:
          enabled: false
      nameOverride: custom
      namespace: boundary
    asserts:
      - equal:
          path: metadata.name
          value: custom-boundary-controller-config
      - equal:
          path: metadata.namespace
          value: boundary
  - it: renders bootstrap hook config with post-install and post-upgrade hooks when runOnUpgrade is true
    documentIndex: 1
    release:
      upgrade: true
    set:
      database:
        init:
          enabled: false
      bootstrapAdmin:
        enabled: true
        runOnUpgrade: true
    asserts:
      - equal:
          path: metadata.name
          value: boundary-controller-bootstrap-hook-config
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install,post-upgrade
