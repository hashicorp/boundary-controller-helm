suite: Controller services
templates:
  - templates/service.yaml
tests:
  - it: renders the api service
    documentIndex: 0
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: boundary-controller-api
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.ports[0].port
          value: 9200
  - it: renders the cluster service
    documentIndex: 1
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: boundary-controller-cluster
      - equal:
          path: spec.type
          value: LoadBalancer
      - equal:
          path: spec.ports[0].port
          value: 9201
  - it: renders the ops service
    documentIndex: 2
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: boundary-controller-ops
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 9203
  - it: renders services into overridden namespace
    set:
      namespace: boundary
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.namespace
          value: boundary
