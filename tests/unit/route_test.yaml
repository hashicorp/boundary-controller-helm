suite: OpenShift Route
templates:
  - templates/route.yaml
tests:
  - it: does not render route when openshift.enabled is false
    set:
      openshift:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: does not render route when openshift.enabled is true but route.api.enabled is false
    set:
      openshift:
        enabled: true
        route:
          api:
            enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: renders route when openshift.enabled and route.api.enabled are true
    set:
      openshift:
        enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Route
      - equal:
          path: apiVersion
          value: route.openshift.io/v1
  - it: renders route with correct name and namespace
    set:
      openshift:
        enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: boundary-controller-api-route
      - equal:
          path: metadata.namespace
          value: NAMESPACE
  - it: renders route name with nameOverride
    set:
      openshift:
        enabled: true
      nameOverride: custom
    asserts:
      - equal:
          path: metadata.name
          value: custom-boundary-controller-api-route
  - it: renders route namespace override
    set:
      openshift:
        enabled: true
      namespace: boundary
    asserts:
      - equal:
          path: metadata.namespace
          value: boundary
  - it: renders route targeting the api service on the api port
    set:
      openshift:
        enabled: true
    asserts:
      - equal:
          path: spec.to.kind
          value: Service
      - equal:
          path: spec.to.name
          value: boundary-controller-api
      - equal:
          path: spec.port.targetPort
          value: api
  - it: renders route with default edge TLS termination and Redirect policy
    set:
      openshift:
        enabled: true
    asserts:
      - equal:
          path: spec.tls.termination
          value: edge
      - equal:
          path: spec.tls.insecureEdgeTerminationPolicy
          value: Redirect
  - it: renders route with custom TLS termination
    set:
      openshift:
        enabled: true
        route:
          api:
            enabled: true
            tls:
              termination: reencrypt
              insecureEdgeTerminationPolicy: None
    asserts:
      - equal:
          path: spec.tls.termination
          value: reencrypt
      - equal:
          path: spec.tls.insecureEdgeTerminationPolicy
          value: None
  - it: renders route with custom host when set
    set:
      openshift:
        enabled: true
        route:
          api:
            enabled: true
            host: boundary.example.com
    asserts:
      - equal:
          path: spec.host
          value: boundary.example.com
  - it: does not render spec.host when host is empty
    set:
      openshift:
        enabled: true
        route:
          api:
            enabled: true
            host: ""
    asserts:
      - notExists:
          path: spec.host
  - it: renders route with custom annotations
    set:
      openshift:
        enabled: true
        route:
          api:
            enabled: true
            annotations:
              haproxy.router.openshift.io/timeout: 60s
    asserts:
      - equal:
          path: metadata.annotations["haproxy.router.openshift.io/timeout"]
          value: 60s
