suite: Validation checks
templates:
  - templates/validate.yaml
tests:
  - it: renders no validation output for default valid values
    asserts:
      - hasDocuments:
          count: 0
  - it: passes validation when TLS is enabled and config paths match tls.mountPath
    set:
      tls:
        disabled: false
        mountPath: /custom/tls
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/custom/tls/tls.crt"
            tls_key_file  = "/custom/tls/tls.key"
          }
    asserts:
      - hasDocuments:
          count: 0
  - it: fails when secretRefs.validateExisting is true and referenced secret does not exist
    set:
      secretRefs:
        validateExisting: true
        secretName: does-not-exist
    asserts:
      - failedTemplate:
          errorPattern: "Secret \"does-not-exist\" not found"
  - it: fails when controller config uses env-based AEAD KMS keys
    set:
      controller:
        config: |
          disable_mlock = true

          kms "aead" {
            purpose = "root"
            key = "env://BOUNDARY_KMS_ROOT"
            key_id = "global_root"
          }
    asserts:
      - failedTemplate:
          errorPattern: "controller.config uses env://BOUNDARY_KMS_\\*"
  - it: fails when migration is enabled but replicas are not zero
    set:
      controller:
        replicas: 2
      database:
        migrate:
          enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "database.migrate.enabled=true requires controller.replicas=0"
  - it: fails when TLS is enabled but cert path does not match tls.mountPath
    set:
      tls:
        disabled: false
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/wrong/path/tls.crt"
            tls_key_file  = "/etc/boundary/tls/tls.key"
          }
    asserts:
      - failedTemplate:
          errorPattern: "missing expected cert path"
  - it: fails when TLS is enabled but key path does not match tls.mountPath
    set:
      tls:
        disabled: false
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/etc/boundary/tls/tls.crt"
            tls_key_file  = "/wrong/path/tls.key"
          }
    asserts:
      - failedTemplate:
          errorPattern: "missing expected key path"

