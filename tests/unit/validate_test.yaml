suite: Validation checks
templates:
  - templates/validate.yaml
tests:
  - it: renders no validation output for default valid values
    asserts:
      - hasDocuments:
          count: 0
  - it: passes validation when TLS is enabled and config paths match tls.mountPath
    set:
      tls:
        disabled: false
        mountPath: /custom/tls
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/custom/tls/tls.crt"
            tls_key_file  = "/custom/tls/tls.key"
          }
    asserts:
      - hasDocuments:
          count: 0
  - it: fails when secretRefs.validateExisting is true and referenced secret does not exist
    set:
      secretRefs:
        validateExisting: true
        secretName: does-not-exist
    asserts:
      - failedTemplate:
          errorPattern: "Secret \"does-not-exist\" not found"
  - it: fails when controller config uses env-based AEAD KMS keys
    set:
      controller:
        config: |
          disable_mlock = true

          kms "aead" {
            purpose = "root"
            key = "env://BOUNDARY_KMS_ROOT"
            key_id = "global_root"
          }
    asserts:
      - failedTemplate:
          errorPattern: "controller.config uses env://BOUNDARY_KMS_\\*"
  - it: fails when migration is enabled but replicas are not zero
    set:
      controller:
        replicas: 2
      database:
        migrate:
          enabled: true
    asserts:
      - failedTemplate:
          errorPattern: "database.migrate.enabled=true requires controller.replicas=0"
  - it: fails when TLS is enabled but cert path does not match tls.mountPath
    set:
      tls:
        disabled: false
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/wrong/path/tls.crt"
            tls_key_file  = "/etc/boundary/tls/tls.key"
          }
    asserts:
      - failedTemplate:
          errorPattern: "missing expected cert path"
  - it: fails when TLS is enabled but key path does not match tls.mountPath
    set:
      tls:
        disabled: false
      controller:
        config: |
          disable_mlock = true

          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_disable   = false
            tls_cert_file = "/etc/boundary/tls/tls.crt"
            tls_key_file  = "/wrong/path/tls.key"
          }
    asserts:
      - failedTemplate:
          errorPattern: "missing expected key path"
  - it: passes when secretRefs.secretName is set and all env refs use correct var names
    set:
      tls:
        disabled: true
      secretRefs:
        secretName: "my-secrets"
      controller:
        config: |
          database {
            url = "env://BOUNDARY_PG_URL"
          }
          controller {
            license = "env://BOUNDARY_LICENSE"
          }
    asserts:
      - hasDocuments:
          count: 0
  - it: fails when secretRefs.secretName is set and database url uses wrong env var name
    set:
      secretRefs:
        secretName: "my-secrets"
      controller:
        config: |
          database {
            url = "env://WRONG_ENV_VAR"
          }
    asserts:
      - failedTemplate:
          errorPattern: "when secrets are enabled.*use \"env://BOUNDARY_PG_URL\" for the database url"
  - it: fails when secretRefs.secretName is set and migration_url uses wrong env var name
    set:
      secretRefs:
        secretName: "my-secrets"
      controller:
        config: |
          database {
            url = "env://BOUNDARY_PG_URL"
            migration_url = "env://MY_MIGRATION_URL"
          }
    asserts:
      - failedTemplate:
          errorPattern: "when secrets are enabled.*use \"env://BOUNDARY_PG_MIGRATION_URL\" for the migration_url"
  - it: fails when secretRefs.secretName is set and license uses wrong env var name
    set:
      secretRefs:
        secretName: "my-secrets"
      controller:
        config: |
          controller {
            license = "env://MY_LICENSE"
          }
    asserts:
      - failedTemplate:
          errorPattern: "when secrets are enabled.*use \"env://BOUNDARY_LICENSE\" for the license"
  - it: passes when secretRefs.secretName is set and custom env var is covered by extraEnv
    set:
      tls:
        disabled: true
      secretRefs:
        secretName: "my-secrets"
      extraEnv:
        - name: MY_CUSTOM_DB_URL
          value: "postgres://user:pass@host/db"
      controller:
        config: |
          database {
            url = "env://MY_CUSTOM_DB_URL"
          }
    asserts:
      - hasDocuments:
          count: 0
  - it: skips env ref validation when secretRefs.secretName is not set
    set:
      tls:
        disabled: true
      secretRefs:
        secretName: ""
      controller:
        config: |
          database {
            url = "env://WRONG_ENV_VAR"
          }
    asserts:
      - hasDocuments:
          count: 0

