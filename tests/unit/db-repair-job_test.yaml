suite: Database repair job
templates:
  - templates/db-repair-job.yaml
tests:
  - it: renders the repair job when a repair version is set
    set:
      database:
        migrate:
          enabled: true
        repair:
          version: "2024-01-01-01"
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: boundary-controller-database-repair
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
      - contains:
          path: spec.template.spec.containers[0].command
          content: -repair
      - contains:
          path: spec.template.spec.containers[0].command
          content: "2024-01-01-01"