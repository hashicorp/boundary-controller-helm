suite: Controller deployment
templates:
  - templates/configmap.yaml
  - templates/deployment.yaml
values:
  - fixtures/feature-enabled.yaml
tests:
  - it: renders the default tag and hardened pod settings
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: hashicorp/boundary-enterprise:0.21.3-ent
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTP
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTP
        template: templates/deployment.yaml
  - it: renders a custom tag when image.tag is overridden
    set:
      image:
        tag: 9.9.9
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: hashicorp/boundary-enterprise:9.9.9
        template: templates/deployment.yaml
  - it: renders custom image repository and pull policy
    set:
      image:
        repository: registry.example.com/boundary-enterprise
        tag: 1.2.3
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/boundary-enterprise:1.2.3
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
        template: templates/deployment.yaml
  - it: uses serviceAccount.name override in deployment
    set:
      serviceAccount:
        name: boundary-custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: boundary-custom-sa
        template: templates/deployment.yaml
  - it: renders automountServiceAccountToken when enabled
    set:
      serviceAccount:
        automountServiceAccountToken: true
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true
        template: templates/deployment.yaml
  - it: renders imagePullSecrets when configured
    set:
      imagePullSecrets:
        - name: regcred
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: regcred
        template: templates/deployment.yaml
  - it: renders extraEnv in deployment
    set:
      extraEnv:
        - name: HTTP_PROXY
          value: http://proxy.example.com:8080
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: http://proxy.example.com:8080
        template: templates/deployment.yaml
  - it: renders TLS secret volume and HTTPS probes when TLS is enabled
    set:
      tls:
        disabled: false
      controller:
        livenessProbe:
          scheme: HTTPS
        readinessProbe:
          scheme: HTTPS
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /etc/boundary/tls
            readOnly: true
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: boundary-controller-tls
        template: templates/deployment.yaml
  - it: auto derives HTTPS probe scheme when TLS is enabled and probe schemes are empty
    set:
      tls:
        disabled: false
      controller:
        livenessProbe:
          scheme: ""
        readinessProbe:
          scheme: ""
        config: |
          listener "tcp" {
            address = "0.0.0.0:9203"
            purpose = "ops"
            tls_disable = false
          }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
  - it: uses HTTP probe when ops listener has tls_disable=true and global tls.disabled=false
    set:
      tls:
        disabled: false
      controller:
        livenessProbe:
          scheme: ""
        readinessProbe:
          scheme: ""
        config: |
          listener "tcp" {
            address = "0.0.0.0:9203"
            purpose = "ops"
            tls_disable = true
          }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTP
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTP
        template: templates/deployment.yaml
  - it: uses HTTPS probe when ops listener has tls_disable=false regardless of global tls.disabled
    set:
      tls:
        disabled: true
      controller:
        livenessProbe:
          scheme: ""
        readinessProbe:
          scheme: ""
        config: |
          listener "tcp" {
            address = "0.0.0.0:9203"
            purpose = "ops"
            tls_disable = false
          }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
  - it: uses HTTPS probe when ops listener has no tls_disable param regardless of global tls.disabled
    set:
      tls:
        disabled: false
      controller:
        livenessProbe:
          scheme: ""
        readinessProbe:
          scheme: ""
        config: |
          listener "tcp" {
            address = "0.0.0.0:9203"
            purpose = "ops"
          }
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.scheme
          value: HTTPS
        template: templates/deployment.yaml
  - it: renders custom TLS mountPath and secretName when TLS is enabled
    set:
      tls:
        disabled: false
        mountPath: /custom/tls
        secretName: custom-tls-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /custom/tls
            readOnly: true
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
            secret:
              secretName: custom-tls-secret
        template: templates/deployment.yaml
  - it: renders migration URL env var when controller config uses env migration URL
    set:
      controller:
        config: |
          controller {
            database {
              migration_url = "env://BOUNDARY_PG_MIGRATION_URL"
            }
          }
      secretRefs:
        keys:
          migrationUrl: migration-url
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_MIGRATION_URL
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: migration-url
        template: templates/deployment.yaml
  - it: renders secretRefs key remapping in deployment env vars
    set:
      controller:
        config: |
          listener "tcp" {
            address = "0.0.0.0:9200"
            purpose = "api"
            tls_cert_file = "/etc/boundary/tls/tls.crt"
            tls_key_file  = "/etc/boundary/tls/tls.key"
          }
          controller {
            license = "env://BOUNDARY_LICENSE"
            database {
              url = "env://BOUNDARY_PG_URL"
            }
          }
      secretRefs:
        keys:
          databaseUrl: db-url-key
          license: lic-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_URL
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: db-url-key
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_LICENSE
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: lic-key
        template: templates/deployment.yaml
  - it: does not inject database or license env vars when controller config uses inline values
    set:
      controller:
        config: |
          controller {
            license = "inline-license"
            database {
              url = "postgres://boundary:password@postgres:5432/boundary?sslmode=require"
            }
          }
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_URL
        template: templates/deployment.yaml
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_LICENSE
        template: templates/deployment.yaml
  - it: renders AEAD env vars when controller config uses env based AEAD keys
    set:
      controller:
        config: |
          kms "aead" {
            purpose = "root"
            key = "env://BOUNDARY_KMS_ROOT"
          }
          kms "aead" {
            purpose = "worker-auth"
            key = "env://BOUNDARY_KMS_WORKER_AUTH"
          }
          kms "aead" {
            purpose = "recovery"
            key = "env://BOUNDARY_KMS_RECOVERY"
          }
      secretRefs:
        keys:
          kmsRoot: kms-root-key
          kmsWorkerAuth: kms-worker-key
          kmsRecovery: kms-recovery-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_KMS_ROOT
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: kms-root-key
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_KMS_WORKER_AUTH
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: kms-worker-key
        template: templates/deployment.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_KMS_RECOVERY
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: kms-recovery-key
        template: templates/deployment.yaml
  - it: renders replicas and rolling update fields from values
    set:
      controller:
        replicas: 3
        rollingUpdate:
          maxUnavailable: 0
          maxSurge: 2
    asserts:
      - equal:
          path: spec.replicas
          value: 3
        template: templates/deployment.yaml
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0
        template: templates/deployment.yaml
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 2
        template: templates/deployment.yaml
  - it: maps deployment container ports from controller service targetPort overrides
    set:
      controller:
        service:
          api:
            targetPort: 19200
          cluster:
            targetPort: 19201
          ops:
            targetPort: 19203
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 19200
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].ports[1].containerPort
          value: 19201
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].ports[2].containerPort
          value: 19203
        template: templates/deployment.yaml
  - it: renders custom liveness and readiness probe timings
    set:
      controller:
        livenessProbe:
          scheme: HTTP
          initialDelaySeconds: 11
          periodSeconds: 12
          failureThreshold: 13
          timeoutSeconds: 14
        readinessProbe:
          scheme: HTTP
          initialDelaySeconds: 21
          periodSeconds: 22
          failureThreshold: 23
          timeoutSeconds: 24
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.initialDelaySeconds
          value: 11
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.periodSeconds
          value: 12
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 13
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.timeoutSeconds
          value: 14
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.initialDelaySeconds
          value: 21
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 22
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 23
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.timeoutSeconds
          value: 24
        template: templates/deployment.yaml
  - it: renders security and scheduling fields from values
    set:
      terminationGracePeriodSeconds: 45
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 200
        runAsGroup: 300
        fsGroup: 400
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 201
        runAsGroup: 301
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
      podAnnotations:
        test-annotation: test-value
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - key: dedicated
          operator: Exists
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app.kubernetes.io/name
                    operator: In
                    values:
                      - boundary-controller
              topologyKey: kubernetes.io/hostname
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 45
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 200
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.securityContext.runAsGroup
          value: 300
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 400
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.securityContext.seccompProfile.type
          value: RuntimeDefault
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 201
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 301
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: linux
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
        template: templates/deployment.yaml
      - exists:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0]
        template: templates/deployment.yaml
      - equal:
          path: spec.template.metadata.annotations["test-annotation"]
          value: test-value
        template: templates/deployment.yaml
  - it: renders custom controller resources
    set:
      controller:
        resources:
          limits:
            cpu: 1000m
            memory: 2Gi
          requests:
            cpu: 300m
            memory: 700Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 1000m
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 2Gi
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 300m
        template: templates/deployment.yaml
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 700Mi
        template: templates/deployment.yaml
  - it: does not render TLS secret volume or mount when TLS is disabled
    set:
      tls:
        disabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
        template: templates/deployment.yaml
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: tls-certs
        template: templates/deployment.yaml
