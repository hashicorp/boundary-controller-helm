suite: Database migrate job
templates:
  - templates/db-migrate-job.yaml
tests:
  - it: renders the migration job with the expected command
    set:
      database:
        migrate:
          enabled: true
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: boundary-controller-database-migration
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-upgrade
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
      - contains:
          path: spec.template.spec.containers[0].command
          content: boundary
      - contains:
          path: spec.template.spec.containers[0].command
          content: migrate