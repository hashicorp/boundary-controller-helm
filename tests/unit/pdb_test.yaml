suite: Controller PDB
templates:
  - templates/pdb.yaml
tests:
  - it: renders a pod disruption budget with minAvailable
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: boundary-controller
      - equal:
          path: spec.minAvailable
          value: 1
  - it: does not render a pod disruption budget when disabled
    set:
      podDisruptionBudget:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: renders a pod disruption budget with maxUnavailable when minAvailable is not set
    set:
      podDisruptionBudget:
        enabled: true
        minAvailable: null
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
  - it: applies nameOverride and namespace in PDB metadata
    set:
      nameOverride: custom
      namespace: boundary
    asserts:
      - equal:
          path: metadata.name
          value: custom
      - equal:
          path: metadata.namespace
          value: boundary
