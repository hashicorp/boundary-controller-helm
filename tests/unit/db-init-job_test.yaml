suite: Database init job
templates:
  - templates/db-init-job.yaml
values:
  - fixtures/feature-enabled.yaml
tests:
  - it: renders the init job with the expected command
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: boundary-controller-init-db
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: pre-install
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "-10"
      - equal:
          path: metadata.annotations["helm.sh/hook-output-log-policy"]
          value: hook-failed
      - equal:
          path: metadata.annotations["helm.sh/hook-delete-policy"]
          value: before-hook-creation
      - equal:
          path: spec.backoffLimit
          value: 2
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 600
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: false
      - equal:
          path: spec.template.spec.serviceAccountName
          value: default
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 100
      - equal:
          path: spec.template.spec.securityContext.fsGroupChangePolicy
          value: OnRootMismatch
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
          value: 1000
      - equal:
          path: spec.template.spec.containers[0].securityContext.seccompProfile.type
          value: RuntimeDefault
      - contains:
          path: spec.template.spec.containers[0].command
          content: sh
      - contains:
          path: spec.template.spec.containers[0].command
          content: /etc/boundary/db-init.sh
      - equal:
          path: spec.template.spec.volumes[0].configMap.name
          value: boundary-controller-hook-config
  - it: renders custom image repository and pull policy in init job
    set:
      image:
        repository: registry.example.com/boundary-enterprise
        tag: 1.2.3
        pullPolicy: Always
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/boundary-enterprise:1.2.3
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
  - it: renders imagePullSecrets in init job when configured
    set:
      imagePullSecrets:
        - name: regcred
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: regcred
  - it: renders extraEnv in init job
    set:
      extraEnv:
        - name: HTTP_PROXY
          value: http://proxy.example.com:8080
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: HTTP_PROXY
            value: http://proxy.example.com:8080
  - it: renders automountServiceAccountToken when enabled in init job
    set:
      serviceAccount:
        automountServiceAccountToken: true
    asserts:
      - equal:
          path: spec.template.spec.automountServiceAccountToken
          value: true
  - it: uses serviceAccount.name override in init hook job
    set:
      serviceAccount:
        name: boundary-custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: boundary-custom-sa
  - it: does not render init job when disabled
    set:
      database:
        init:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: renders custom TLS mountPath in init job when TLS is enabled
    set:
      database:
        init:
          enabled: true
      tls:
        disabled: false
        mountPath: /custom/tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls-certs
            mountPath: /custom/tls
            readOnly: true
  - it: renders secretRefs key remapping for database URL and license in init job
    set:
      controller:
        config: |
          controller {
            license = "env://BOUNDARY_LICENSE"
            database { url = "env://BOUNDARY_PG_URL" }
          }
      secretRefs:
        keys:
          databaseUrl: db-url-key
          license: lic-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_URL
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: db-url-key
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_LICENSE
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: lic-key
  - it: does not inject database or license env vars in init job when controller config uses inline values
    set:
      controller:
        config: |
          controller {
            license = "inline-license"
            database {
              url = "postgres://boundary:password@postgres:5432/boundary?sslmode=require"
            }
          }
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_URL
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_LICENSE
  - it: renders AEAD env vars when config uses env based AEAD keys in init job
    set:
      controller:
        config: |
          kms "aead" {
            purpose = "root"
            key = "env://BOUNDARY_KMS_ROOT"
          }
      secretRefs:
        keys:
          kmsRoot: kms-root-key
          kmsWorkerAuth: kms-worker-key
          kmsRecovery: kms-recovery-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_KMS_ROOT
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: kms-root-key
  - it: renders migration URL env var in init job when config uses env migration URL
    set:
      controller:
        config: |
          controller {
            database {
              migration_url = "env://BOUNDARY_PG_MIGRATION_URL"
            }
          }
      secretRefs:
        keys:
          migrationUrl: migration-url
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: BOUNDARY_PG_MIGRATION_URL
            valueFrom:
              secretKeyRef:
                name: boundary-controller-secrets
                key: migration-url
  - it: renders custom database resources in init job
    set:
      database:
        resources:
          limits:
            cpu: 800m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: 800m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi
  - it: renders nameOverride and namespace in init job metadata
    set:
      nameOverride: custom
      namespace: boundary
    asserts:
      - equal:
          path: metadata.name
          value: custom-boundary-controller-init-db
      - equal:
          path: metadata.namespace
          value: boundary
  - it: uses openshift podSecurityContext and omits runAsUser in init job when openshift.enabled is true
    set:
      openshift:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - notExists:
          path: spec.template.spec.securityContext.runAsUser
      - notExists:
          path: spec.template.spec.securityContext.fsGroup
  - it: uses openshift containerSecurityContext in init job when openshift.enabled is true
    set:
      openshift:
        enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - notExists:
          path: spec.template.spec.containers[0].securityContext.runAsGroup
  - it: uses default podSecurityContext with runAsUser in init job when openshift.enabled is false
    set:
      openshift:
        enabled: false
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 100
