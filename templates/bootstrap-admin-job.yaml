{{- if and .Values.bootstrapAdmin.enabled (or .Release.IsInstall (and .Release.IsUpgrade .Values.bootstrapAdmin.runOnUpgrade)) }}
{{- include "boundary.controller.validateSecretRefs" . -}}
{{- include "boundary.controller.validateConfig" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "boundary.controller.serviceName" . }}-bootstrap-admin
  namespace: {{ include "boundary.namespace" . }}
  labels:
    {{- include "boundary.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller-bootstrap-admin
  annotations:
    "helm.sh/hook": {{ if .Values.bootstrapAdmin.runOnUpgrade }}post-install,post-upgrade{{ else }}post-install{{ end }}
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "boundary.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller-bootstrap-admin
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "boundary.controller.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: bootstrap-admin
          image: "{{ include "boundary.controller.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SKIP_SETCAP
              value: "1"
            - name: BOUNDARY_ADDR
              value: "{{ if not .Values.tls.disabled }}https{{ else }}http{{ end }}://{{ include "boundary.controller.apiServiceName" . }}:{{ .Values.controller.service.api.port }}"
            {{- if not .Values.tls.disabled }}
            - name: BOUNDARY_CACERT
              value: "{{ .Values.tls.mountPath }}/tls.crt"
            {{- end }}
            - name: BOUNDARY_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.adminUsername }}
            - name: BOUNDARY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.adminPassword }}
            - name: WAIT_TIMEOUT
              value: {{ .Values.bootstrapAdmin.waitTimeoutSeconds | quote }}
            - name: BOUNDARY_AUTH_METHOD_NAME
              value: {{ .Values.bootstrapAdmin.authMethodName | quote }}
            - name: BOUNDARY_USER_RESOURCE_NAME
              value: {{ .Values.bootstrapAdmin.userResourceName | quote }}
            - name: BOUNDARY_ACCOUNT_RESOURCE_NAME
              value: {{ .Values.bootstrapAdmin.accountResourceName | quote }}
            - name: BOUNDARY_ROLE_NAME
              value: {{ .Values.bootstrapAdmin.roleName | quote }}
            {{- if eq (include "boundary.controller.usesEnvMigrationUrl" . | trim) "true" }}
            - name: BOUNDARY_PG_MIGRATION_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.migrationUrl }}
            {{- end }}
          command:
            - "sh"
            - "/etc/boundary/bootstrap-admin.sh"
          resources:
            {{- toYaml .Values.bootstrapAdmin.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/boundary
              readOnly: true
            {{- if not .Values.tls.disabled }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: boundary-data
              mountPath: /boundary
      volumes:
        - name: config
          configMap:
            name: {{ include "boundary.controller.configMapName" . }}
        {{- if not .Values.tls.disabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: boundary-data
          emptyDir: {}
{{- end }}
