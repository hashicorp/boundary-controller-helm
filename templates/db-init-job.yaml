{{- if and .Release.IsInstall .Values.database.init.enabled }}
{{- include "boundary.controller.validateSecretRefs" . -}}
{{- include "boundary.controller.validateConfig" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "boundary.controller.serviceName" . }}-init-db
  namespace: {{ include "boundary.namespace" . }}
  labels:
    {{- include "boundary.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller-init
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-output-log-policy": hook-failed, hook-succeeded
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "boundary.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller-init
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "boundary.controller.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: init-db
          image: "{{ include "boundary.controller.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SKIP_SETCAP
              value: "1"
            - name: BOUNDARY_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.databaseUrl }}
            {{- if eq (include "boundary.controller.usesEnvMigrationUrl" . | trim) "true" }}
            - name: BOUNDARY_PG_MIGRATION_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.migrationUrl }}
            {{- end }}
            - name: BOUNDARY_LICENSE
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.license }}
            {{- if eq (include "boundary.controller.usesEnvAeadKms" . | trim) "true" }}
            - name: BOUNDARY_KMS_ROOT
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.kmsRoot }}
            - name: BOUNDARY_KMS_WORKER_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.kmsWorkerAuth }}
            - name: BOUNDARY_KMS_RECOVERY
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.secretRefs.keys.kmsRecovery }}
            {{- end }}
          command:
            - "sh"
            - "/etc/boundary/db-init.sh"
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/boundary
              readOnly: true
            {{- if not .Values.tls.disabled  }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: boundary-data
              mountPath: /boundary
      volumes:
        - name: config
          configMap:
            name: {{ include "boundary.controller.configMapName" . }}
        {{- if not .Values.tls.disabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: boundary-data
          emptyDir: {}
{{- end }}
