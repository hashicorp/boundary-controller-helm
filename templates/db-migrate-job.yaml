{{- if .Values.controller.database.migrate.enabled }}
{{- include "boundary.controller.validateSecretRefs" . -}}
{{- include "boundary.controller.validateConfig" . -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "boundary.controller.serviceName" . }}-database-migration
  {{- if .Values.namespace }}
  namespace: {{ .Values.namespace }}
  {{- end }}
  labels:
    {{- include "boundary.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller-migrate
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "boundary.labels" . | nindent 8 }}
        app.kubernetes.io/component: controller-migrate
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      serviceAccountName: {{ include "boundary.controller.serviceAccountName" . }}
      restartPolicy: OnFailure
      containers:
        - name: migrate-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: SKIP_SETCAP
              value: "1"
            - name: BOUNDARY_PG_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.controller.secretRefs.keys.databaseUrl }}
            - name: BOUNDARY_LICENSE
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.controller.secretRefs.keys.license }}
            {{- if eq (include "boundary.controller.usesEnvAeadKms" . | trim) "true" }}
            - name: BOUNDARY_KMS_ROOT
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.controller.secretRefs.keys.kmsRoot }}
            - name: BOUNDARY_KMS_WORKER_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.controller.secretRefs.keys.kmsWorkerAuth }}
            - name: BOUNDARY_KMS_RECOVERY
              valueFrom:
                secretKeyRef:
                  name: {{ include "boundary.controller.secretName" . }}
                  key: {{ .Values.controller.secretRefs.keys.kmsRecovery }}
            {{- end }}
          command:
            - "boundary"
            - "database"
            - "migrate"
            - "-config"
            - "/etc/boundary/controller.hcl"
          resources:
            {{- toYaml .Values.controller.database.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/boundary
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            - name: boundary-data
              mountPath: /boundary
      volumes:
        - name: config
          configMap:
            name: {{ include "boundary.controller.configMapName" . }}
        {{- if .Values.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: boundary-data
          emptyDir: {}
{{- end }}
