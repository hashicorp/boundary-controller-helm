apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "boundary.controller.configMapName" . }}
  namespace: {{ include "boundary.namespace" . }}
  labels:
    {{- include "boundary.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  controller.hcl: |
{{ tpl .Values.controller.config . | indent 4 }}
  db-init.sh: |
{{ .Files.Get "scripts/db-init.sh" | indent 4 }}
  bootstrap-admin.sh: |
{{ .Files.Get "scripts/bootstrap-admin.sh" | indent 4 }}
