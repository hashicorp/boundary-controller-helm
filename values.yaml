# Default values for Boundary Controller Helm Chart

# Override chart name (used in resource naming)
nameOverride: ""
fullnameOverride: ""

# Boundary image configuration
image:
  repository: hashicorp/boundary-enterprise
  tag: "0.19-ent"
  pullPolicy: IfNotPresent

# Image pull secrets
imagePullSecrets: []
# - name: regcred

tls:
  enabled: true
  secretName: "boundary-controller-tls" # Name of K8s tls Secret containing tls.crt and tls.key
  mountPath: "/etc/boundary/tls"

# Controller configuration
controller:
  replicas: 2
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  # Boundary controller configuration in HCL format.
  # Rendered with tpl, so .Values references can be used inside this block.
  # https://developer.hashicorp.com/boundary/docs/configuration/controller
  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9200"
      purpose = "api"
      tls_disable   = false
      tls_cert_file = "{{ .Values.tls.mountPath }}/tls.crt"
      tls_key_file  = "{{ .Values.tls.mountPath }}/tls.key"
    }

    listener "tcp" {
      address = "0.0.0.0:9201"
      purpose = "cluster"
      tls_disable   = false
      tls_cert_file = "{{ .Values.tls.mountPath }}/tls.crt"
      tls_key_file  = "{{ .Values.tls.mountPath }}/tls.key"
    }

    listener "tcp" {
      address = "0.0.0.0:9203"
      purpose = "ops"
      tls_disable = false
      tls_cert_file = "{{ .Values.tls.mountPath }}/tls.crt"
      tls_key_file  = "{{ .Values.tls.mountPath }}/tls.key"
    }

    controller {
      name = "boundary-controller"
      description = "Boundary Controller running in Kubernetes"
      public_cluster_addr = "{{ printf "%s:9201" (include "boundary.controller.clusterServiceName" .) }}"
      license = "env://BOUNDARY_LICENSE"
      database {
        url = "env://BOUNDARY_PG_URL"
      }
      graceful_shutdown_wait_duration = "10s"

      # Rate limiting examples to conserve controller resources
      # total limit for all resources and actions
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "total"
        limit   = 500
        period  = "1s"
      }

      # Limit for ip addresses to all resources+actions to prevent a malicious
      # host that is fabricating tokens, or spamming unauthed endpoints
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "ip-address"
        limit   = 100
        period  = "1s"
      }

      # Limit of all authed requests, to prevent one user consuming all of the total limit
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "auth-token"
        limit   = 100
        period  = "1s"
      }
    }

    # https://developer.hashicorp.com/boundary/docs/configuration/kms#configuration
    kms "awskms" {
      purpose    = "root"
      region     = "us-east-1"
      kms_key_id = "alias/boundary-root"
    }

    kms "awskms" {
      purpose    = "recovery"
      region     = "us-east-1"
      kms_key_id = "alias/boundary-recovery"
    }

    kms "awskms" {
      purpose    = "worker-auth"
      region     = "us-east-1"
      kms_key_id = "alias/boundary-worker-auth"
    }

    events {
      audit_enabled = true
      observations_enabled = true
      sysevents_enabled = true
      telemetry_enabled = true
      sink "stderr" {
        name = "default"
        event_types = ["*"]
        format = "cloudevents-json"
      }
    }


  # Secret keys consumed by Boundary via environment variables.
  # In awskms mode, only databaseUrl and license are required.
  secretRefs:
    secretName: "boundary-controller-secrets"  # Name of the Kubernetes Secret to read values from
    # When true templates validate that the Secret exists in the release namespace and contains all configured keys.
    # Keep false for offline rendering (helm template) without cluster access.
    validateExisting: true
    keys:
      databaseUrl: "database-url"
      license: "license"
      # Login name value used by `boundary accounts create password -login-name`.
      adminUsername: "admin-username"
      adminPassword: "admin-password"

  bootstrapAdmin:
    enabled: true
    runOnUpgrade: false
    waitTimeoutSeconds: 120
    authMethodName: "bootstrap-password"
    # Boundary user resource display name (from `boundary users create -name`), not the login credential.
    userResourceName: "bootstrap-admin"
    # Boundary account resource display name (from `boundary accounts create password -name`).
    accountResourceName: "bootstrap-admin"
    roleName: "bootstrap-global-admin"

  database:
    migrate:
      enabled: false  # Enable database migration job during upgrades

  # Liveness probe configuration
  livenessProbe:
    scheme: HTTPS
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Readiness probe configuration
  readinessProbe:
    scheme: HTTPS
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Resource limits and requests
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Service configuration
  service:
    type: LoadBalancer
    port: 9200
    targetPort: 9200

    clusterType: ClusterIP
    clusterPort: 9201
    clusterTargetPort: 9201
    opsPort: 9203
    opsTargetPort: 9203
    
    # Service annotations are cloud-provider specific.
    # Set annotations required by your environment.
    annotations: {}

    # --- AWS (EKS + NLB) ---
    # https://docs.aws.amazon.com/eks/latest/userguide/auto-configure-nlb.html
    # https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/guide/service/annotations/
    #  service.beta.kubernetes.io/aws-load-balancer-type: "nlb-ip"
    #  service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    #  service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    #  service.beta.kubernetes.io/aws-load-balancer-attributes: "load_balancing.cross_zone.enabled=true"

    # --- GCP (GKE) ---
    # https://docs.cloud.google.com/kubernetes-engine/docs/concepts/service-load-balancer-parameters#service_parameters
    #  cloud.google.com/l4-rbs: "enabled"

    # --- Azure (AKS) ---
    # https://learn.microsoft.com/en-us/azure/aks/configure-load-balancer-standard?tabs=create-cluster-ip-based%2Ccreate-cluster-managed-outbound-ips%2Ccreate-cluster-custom-ips%2Ccreate-cluster-custom-ip-prefixes%2Ccreate-cluster-outbound-ports-ips%2Ccreate-cluster-idle-timeout#customizations-via-kubernetes-annotations
    #  service.beta.kubernetes.io/azure-load-balancer-tcp-idle-timeout: "30"

# Pod security context
podSecurityContext:
  runAsUser: 100
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000

# Container security context
containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# ServiceAccount configuration
# Annotate with eks.amazonaws.com/role-arn for IRSA (AWS KMS access)
serviceAccount:
  create: false
  name: "default"  # Defaults to the chart name when empty
  # annotations: {}
  # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/boundary-controller-role

# PodDisruptionBudget — prevents both replicas being evicted simultaneously
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Use either minAvailable or maxUnavailable, not both

# Seconds Kubernetes waits before sending SIGKILL after SIGTERM.
# Should exceed controller.config graceful_shutdown_wait_duration (default 10s).
terminationGracePeriodSeconds: 15