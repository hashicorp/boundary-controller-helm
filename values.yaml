nameOverride: ""
fullnameOverride: ""
# Overrides the namespace for all resources. Leave empty to use the Helm release namespace.
namespace: ""

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------

image:
  repository: hashicorp/boundary-enterprise
  # Defaults to Chart.appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# TLS
# ---------------------------------------------------------------------------

tls:
  # When false, the TLS Secret is mounted for listeners that reference tls_cert_file/tls_key_file.
  # When true, no Secret is required.
  # Probe scheme (HTTP/HTTPS) is derived from the ops listener's tls_disable param, not this flag.
  disabled: false
  secretName: "boundary-controller-tls"
  mountPath: "/etc/boundary/tls"
  # The TLS certificate must include SANs for every hostname the chart uses internally.
  # Required SANs (adjust if nameOverride/fullnameOverride is set):
  #   DNS:<fullname>                                     (e.g. boundary-controller)
  #   DNS:<fullname>-api                                 (e.g. boundary-controller-api)
  #   DNS:<fullname>.boundary.svc.cluster.local
  #   DNS:<fullname>-api.boundary.svc.cluster.local
  #   DNS:localhost
  # The bootstrap-admin job connects to https://<fullname>-api:<port> and verifies
  # the cert against BOUNDARY_CACERT — if the SAN is missing, the job will time out.

# ---------------------------------------------------------------------------
# Secret References
# ---------------------------------------------------------------------------

secretRefs:
  secretName: "boundary-controller-secrets"
  # When true, validates the Secret exists with all required keys at render time.
  # Set to false for offline rendering (helm template without cluster access).
  validateExisting: false
  keys:
    databaseUrl: "database-url"
    # Required only when env://BOUNDARY_PG_MIGRATION_URL is referenced in controller.config.
    migrationUrl: "migration-url"
    license: "license"
    adminUsername: "admin-username"
    adminPassword: "admin-password"

# ---------------------------------------------------------------------------
# Controller
# ---------------------------------------------------------------------------

controller:
  replicas: 2
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9200"
      purpose = "api"
      tls_disable   = false
      tls_cert_file = "/etc/boundary/tls/tls.crt"
      tls_key_file  = "/etc/boundary/tls/tls.key"
    }

    listener "tcp" {
      address = "0.0.0.0:9201"
      purpose = "cluster"
    }

    listener "tcp" {
      address = "0.0.0.0:9203"
      purpose = "ops"
      tls_disable   = false
      tls_cert_file = "/etc/boundary/tls/tls.crt"
      tls_key_file  = "/etc/boundary/tls/tls.key"
    }

    controller {
      name = "boundary-controller"
      description = "Boundary controller running in Kubernetes"
      public_cluster_addr = "boundary-controller-cluster.boundary.svc.cluster.local:9201"
      license = "<your-license-here>"

      database {
        url = "postgres://<user>:<password>@<host>:5432/<dbname>?sslmode=require"
      }
    }

    # AEAD is for development and testing only — keys are stored in plaintext.
    # Replace with a production KMS provider before deploying.
    # https://developer.hashicorp.com/boundary/docs/configuration/kms/aead
    kms "aead" {
      purpose   = "root"
      aead_type = "aes-gcm"
      key       = "sP1fnF5Xz85RrXyELHFeZg9Ad2qt4Z4bgNHVGtD6sFo="
      key_id    = "global_root"
    }

    kms "aead" {
      purpose   = "recovery"
      aead_type = "aes-gcm"
      key       = "8fZBjCUfN0TzjEGLQldGY4+iE9AkOvCfjh7+p0GtRBQ="
      key_id    = "global_recovery"
    }

    kms "aead" {
      purpose   = "worker-auth"
      aead_type = "aes-gcm"
      key       = "ATTK2pMjMTEJGlAkUJAePnFMlNLQaXBnhSqJHVlJeKQ="
      key_id    = "global_worker-auth"
    }

    events {
      audit_enabled        = true
      sysevents_enabled    = true
      observations_enabled = true
      sink "stderr" {
        name = "all-events"
        description = "All events sent to stderr"
        event_types = ["*"]
        format = "hclog-text"
      }
    }

  livenessProbe:
    # Probe scheme for /health on the ops listener. Auto-derived from the ops
    # listener's tls_disable param (HTTPS unless tls_disable=true). Override only if needed.
    scheme: ""
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  readinessProbe:
    # Probe scheme for /health on the ops listener. Auto-derived from the ops
    # listener's tls_disable param (HTTPS unless tls_disable=true). Override only if needed.
    scheme: ""
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Use annotations for cloud-provider load balancer customization (AWS NLB, GCP L4, Azure).
  service:
    api:
      type: LoadBalancer
      port: 9200
      targetPort: 9200
      annotations: {}
    # Cluster listener — internal worker registration. Use LoadBalancer only
    # if workers run outside the cluster network.
    cluster:
      type: ClusterIP
      port: 9201
      targetPort: 9201
      annotations: {}
    # Ops listener — health checks and metrics. Not exposed externally.
    ops:
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}

# ---------------------------------------------------------------------------
# Database Jobs
# ---------------------------------------------------------------------------

database:
  init:
    # Enable on first install only.
    enabled: false
  migrate:
    # Enable as a one-time flag during upgrades.
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  repair:
    # When set, runs a repair migration for the specified version during upgrade.
    version: ""

# ---------------------------------------------------------------------------
# Bootstrap Admin
# ---------------------------------------------------------------------------

bootstrapAdmin:
  enabled: false
  runOnUpgrade: false
  waitTimeoutSeconds: 120
  authMethodName: "bootstrap-auth-method"
  userResourceName: "bootstrap-admin"
  accountResourceName: "bootstrap-admin"
  roleName: "bootstrap-global-admin"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
extraEnv: []

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------

# The chart does not create a ServiceAccount. Reference an existing one.
serviceAccount:
  # Use a dedicated ServiceAccount in production instead of the default.
  name: "default"
  automountServiceAccountToken: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

# Must exceed graceful_shutdown_wait_duration in controller.config (default 10s).
terminationGracePeriodSeconds: 15

# --------------------------------------------------
# OpenShift
# --------------------------------------------------

# Set openshift.enabled=true when deploying on OpenShift.
# - Forces the API Service type to ClusterIP (a Route handles external traffic instead).
# - Drops the fixed runAsUser/runAsGroup/fsGroup so OpenShift's SCC assigns a valid UID from the namespace range.
# - Renders a route.openshift.io/v1 Route for the controller API port.
openshift:
  enabled: false
  # Pod security context used instead of podSecurityContext when openshift.enabled=true.
  # runAsUser/runAsGroup/fsGroup are intentionally absent so the namespace SCC assigns them.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # Container security context used instead of containerSecurityContext when openshift.enabled=true.
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  route:
    api:
      enabled: true
      # Leave empty to let OpenShift auto-assign a hostname from the cluster's ingress domain.
      host: ""
      tls:
        # edge terminates TLS at the OCP router; the controller API listener runs with tls_disable=true.
        # Switch to reencrypt if you configure TLS on the API listener.
        termination: edge
        insecureEdgeTerminationPolicy: Redirect
      annotations: {}
