# Default values for Boundary Controller Helm Chart

# --------------------------------------------------
# Naming and Namespace
# --------------------------------------------------

# Override chart-generated resource names. Ex: if set to "custom", resources will be named custom-api, custom-cluster, etc.
nameOverride: ""

# Namespace to deploy resources into, keep empty to use the namespace provided via --namespace flag during helm install/upgrade
# If set, all resources will be deployed into the specified namespace regardless of the Helm release namespace.
namespace: ""

# --------------------------------------------------
# Image
# --------------------------------------------------

# Boundary image configuration
image:
  repository: hashicorp/boundary-enterprise
  tag: "0.21-ent"
  pullPolicy: IfNotPresent

# https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry
# Image pull secret to use for registry authentication.
imagePullSecrets: []
# imagePullSecrets:
#   - name: image-pull-secret

# --------------------------------------------------
# TLS
# --------------------------------------------------

tls:
  # ⚠️ SECURITY WARNING: TLS is disabled by default for convenience only.
  # Set disabled to false and supply a valid certificate via secretName for all non-development environments.
  disabled: true
  # Name of the Kubernetes TLS Secret containing tls.crt and tls.key
  secretName: "boundary-controller-tls"
  # Path where TLS certs are mounted inside the container
  mountPath: "/etc/boundary/tls"

# --------------------------------------------------
# Secret References
# --------------------------------------------------

# Secret keys consumed by Boundary via environment variables.
secretRefs:
  secretName: "boundary-controller-secrets"
  # When true templates validate that the Secret exists in the effective chart namespace
  # (the release namespace unless overridden by .Values.namespace) and contains all configured keys.
  # Keep false for offline rendering (helm template) without cluster access.
  validateExisting: false
  keys:
    # https://developer.hashicorp.com/boundary/docs/configuration/controller
    # postgresql://<username>:<password>@<hostname>:5432/boundary?sslmode=require
    databaseUrl: "database-url"
    # Optional alternate URL for migration/repair workflows.
    # migrationUrl: "migration-url"
    # https://developer.hashicorp.com/boundary/docs/configuration/controller#license
    license: "license"
    adminUsername: "admin-username"
    adminPassword: "admin-password"

# --------------------------------------------------
# Controller
# --------------------------------------------------

# Controller deployment configuration
controller:
  replicas: 2
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  # Boundary controller configuration in HCL format.  
  # Rendered with tpl, so .Values references can be used inside this block.
  # Secret values can be consumed via environment variables (e.g. license, database URL) and referenced in the config using env://VAR_NAME syntax.
  # https://developer.hashicorp.com/boundary/docs/configuration/controller
  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9200"
      purpose = "api"
      tls_disable   = {{ .Values.tls.disabled }}
      tls_cert_file = "{{ .Values.tls.mountPath }}/tls.crt"
      tls_key_file  = "{{ .Values.tls.mountPath }}/tls.key"
    }

    listener "tcp" {
      address = "0.0.0.0:9201"
      purpose = "cluster"
    }

    listener "tcp" {
      address = "0.0.0.0:9203"
      purpose = "ops"
      tls_disable = {{ .Values.tls.disabled }}
      tls_cert_file = "{{ .Values.tls.mountPath }}/tls.crt"
      tls_key_file  = "{{ .Values.tls.mountPath }}/tls.key"
    }

    controller {
      name = "boundary-controller"
      description = "Boundary Controller running in Kubernetes"
      public_cluster_addr = "{{ printf "%s:9201" (include "boundary.controller.clusterServiceName" .) }}"
      license = "env://BOUNDARY_LICENSE"
      database {
        url = "env://BOUNDARY_PG_URL"
        # migration_url = "env://BOUNDARY_PG_MIGRATION_URL"
      }
      graceful_shutdown_wait_duration = "10s"

      # Rate limiting examples to conserve controller resources
      # total limit for all resources and actions
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "total"
        limit   = 500
        period  = "1s"
      }

      # Limit for ip addresses to all resources+actions to prevent a malicious
      # host that is fabricating tokens, or spamming unauthed endpoints
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "ip-address"
        limit   = 100
        period  = "1s"
      }

      # Limit of all authed requests, to prevent one user consuming all of the total limit
      api_rate_limit {
        resources = ["*"]
        actions   = ["*"]
        per     = "auth-token"
        limit   = 100
        period  = "1s"
      }
    }

    # https://developer.hashicorp.com/boundary/docs/configuration/kms#configuration
    # IMPORTANT: The KMS configuration below is an EXAMPLE ONLY and will NOT work in your environment.
    # You MUST customize these values for your specific cloud provider, region, and KMS keys.
    # For production deployments, use your cloud provider's KMS service (AWS KMS, GCP Cloud KMS, Azure Key Vault).
    # Uncomment and configure the appropriate KMS stanza for your environment:
    
    # AWS KMS Example (customize region and key IDs, then uncomment):
    kms "awskms" {
      purpose    = "root"
      region     = "us-east-1"  # Change to your AWS region
      kms_key_id = "alias/boundary-root"  # Change to your KMS key ID or alias
    }

    kms "awskms" {
      purpose    = "recovery"
      region     = "us-east-1"  # Change to your AWS region
      kms_key_id = "alias/boundary-recovery"  # Change to your KMS key ID or alias
    }

    kms "awskms" {
      purpose    = "worker-auth"
      region     = "us-east-1"  # Change to your AWS region
      kms_key_id = "alias/boundary-worker-auth"  # Change to your KMS key ID or alias
    }

    # GCP Cloud KMS Example:
    # kms "gcpckms" {
    #   purpose     = "root"
    #   project     = "your-gcp-project"
    #   region      = "global"
    #   key_ring    = "boundary-keyring"
    #   crypto_key  = "boundary-root"
    # }

    # Azure Key Vault Example:
    # kms "azurekeyvault" {
    #   purpose       = "root"
    #   tenant_id     = "your-tenant-id"
    #   vault_name    = "your-vault-name"
    #   key_name      = "boundary-root"
    # }

    events {
      audit_enabled = true
      observations_enabled = true
      sysevents_enabled = true
      telemetry_enabled = true
      sink "stderr" {
        name = "default"
        event_types = ["*"]
        format = "cloudevents-json"
      }
    }

  # Liveness probe configuration
  livenessProbe:
    # Set this to HTTPS when tls.disabled=false
    scheme: HTTP
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Readiness probe configuration
  readinessProbe:
    # Set this to HTTPS when tls.disabled=false
    scheme: HTTP
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  # Resource limits and requests for the controller container. Adjust based on your environment and expected load.
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  # Service configuration for API, Cluster, and Ops listeners
  # https://developer.hashicorp.com/boundary/docs/monitor/listeners
  #
  # ⚠️ SECURITY WARNING: LoadBalancer service types will create public endpoints in most cloud environments.
  # This exposes your Boundary services to the internet. Consider using ClusterIP with an Ingress controller
  # or internal load balancer annotations for production deployments.
  service:
    api:
      type: LoadBalancer  # Change to ClusterIP for internal-only access
      port: 9200
      targetPort: 9200

      # Service annotations are cloud-provider specific.
      # Set annotations required by your environment.
      annotations: {}
      # --- AWS (EKS + NLB) ---
      # Empty annotations on EKS usually create a Classic Load Balancer.
      # For NLB annotations to work, install AWS Load Balancer Controller:
      # https://docs.aws.amazon.com/eks/latest/userguide/lbc-helm.html
      # https://docs.aws.amazon.com/eks/latest/userguide/auto-configure-nlb.html
      # https://kubernetes-sigs.github.io/aws-load-balancer-controller/latest/guide/service/annotations/
      
      #  service.beta.kubernetes.io/aws-load-balancer-type: "external"
      #  service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
      #  service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
      #  service.beta.kubernetes.io/aws-load-balancer-attributes: "load_balancing.cross_zone.enabled=true"

      # --- GCP (GKE) ---
      # https://docs.cloud.google.com/kubernetes-engine/docs/concepts/service-load-balancer-parameters#service_parameters
      #  cloud.google.com/l4-rbs: "enabled"

      # --- Azure (AKS) ---
      # https://learn.microsoft.com/en-us/azure/aks/configure-load-balancer-standard?tabs=create-cluster-ip-based%2Ccreate-cluster-managed-outbound-ips%2Ccreate-cluster-custom-ips%2Ccreate-cluster-custom-ip-prefixes%2Ccreate-cluster-outbound-ports-ips%2Ccreate-cluster-idle-timeout#customizations-via-kubernetes-annotations
      #  service.beta.kubernetes.io/azure-load-balancer-tcp-idle-timeout: "30"

    # https://developer.hashicorp.com/boundary/docs/monitor/listeners#cluster
    # ⚠️ SECURITY WARNING: This service is used for worker registration and should typically
    # be accessible to workers. Consider network policies or internal load balancer annotations.
    cluster:
      type: ClusterIP
      port: 9201
      targetPort: 9201
      annotations: {}

    # https://developer.hashicorp.com/boundary/docs/monitor/listeners#ops
    ops:
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}

# --------------------------------------------------
# Database Jobs
# --------------------------------------------------

# Database configuration and jobs
database:
  init:
    # Run database init job during install
    enabled: true
  migrate:
    # Enable database migration job during upgrades
    enabled: false
  # Resource limits and requests for database init/migration jobs
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  repair:
    # If set, runs the repair function for the provided migration version
    version: ""

# --------------------------------------------------
# Bootstrap Admin
# --------------------------------------------------

# Bootstrap admin user configuration.
# When enabled, a bootstrap admin user is created on initial install and optionally during upgrades.
# This can be used for initial login and setup of Boundary.
bootstrapAdmin:
  enabled: true
  runOnUpgrade: false
  # Max job wait time for the Boundary API to become reachable before failing
  waitTimeoutSeconds: 120
  authMethodName: "bootstrap-password"
  # Boundary user resource display name (from `boundary users create -name`), not the login credential.
  userResourceName: "bootstrap-admin"
  # Boundary account resource display name (from `boundary accounts create password -name`).
  accountResourceName: "bootstrap-admin"
  roleName: "bootstrap-global-admin"
  # Resource limits and requests for bootstrap admin job
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# --------------------------------------------------
# Pod and Container Security
# --------------------------------------------------

# Pod security context
podSecurityContext:
  runAsUser: 100
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000

# Container security context
containerSecurityContext:
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

# --------------------------------------------------
# Scheduling and Metadata
# --------------------------------------------------

# Pod annotations
podAnnotations: {}

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# --------------------------------------------------
# Service Account
# --------------------------------------------------

# ServiceAccount configuration
# Chart does not create ServiceAccounts. Provide an existing ServiceAccount name.
serviceAccount:
  # Existing ServiceAccount used by controller and hook jobs
  name: "default"
  automountServiceAccountToken: false

# --------------------------------------------------
# Availability and Shutdown
# --------------------------------------------------

# PodDisruptionBudget — prevents both replicas being evicted simultaneously
podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1  # Use either minAvailable or maxUnavailable, not both

# Seconds Kubernetes waits before sending SIGKILL after SIGTERM.
# Should exceed controller.config graceful_shutdown_wait_duration (default 10s).
terminationGracePeriodSeconds: 15
