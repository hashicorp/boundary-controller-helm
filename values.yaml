nameOverride: ""
fullnameOverride: ""
namespace: "" # Leave empty to use the Helm release namespace.

image:
  repository: hashicorp/boundary-enterprise
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

tls:
  disabled: false # When false, TLS is enabled (HTTPS probes, TLS secret mounted). Set to true to disable TLS (HTTP probes, no TLS secret required).
  secretName: "boundary-controller-tls"
  mountPath: "/etc/boundary/tls"

secretRefs:
  secretName: "boundary-controller-secrets"
  validateExisting: false # When true, validates the Secret exists with all keys at render time. Set false for offline rendering.
  keys:
    databaseUrl: "database-url"
    migrationUrl: "migration-url"
    license: "license"
    adminUsername: "admin-username"
    adminPassword: "admin-password"

controller:
  replicas: 2
  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 1

  config: |
    disable_mlock = true

    listener "tcp" {
      address = "0.0.0.0:9200"
      purpose = "api"
      tls_disable   = true
      tls_cert_file = "/etc/boundary/tls/tls.crt"
      tls_key_file  = "/etc/boundary/tls/tls.key"
    }

    listener "tcp" {
      address = "0.0.0.0:9201"
      purpose = "cluster"
    }

    listener "tcp" {
      address = "0.0.0.0:9203"
      purpose = "ops"
      tls_disable   = true
      tls_cert_file = "/etc/boundary/tls/tls.crt"
      tls_key_file  = "/etc/boundary/tls/tls.key"
    }

    controller {
      name = "boundary-controller"
      description = "Boundary controller running in Kubernetes"
      public_cluster_addr = "boundary-controller-cluster.boundary.svc.cluster.local:9201"
      license = "<your-license-here>"

      database {
        url = "postgres://<user>:<password>@<host>:5432/<dbname>?sslmode=require"
      }
    }

    # AEAD is for development and testing only — keys are stored in plaintext.
    # Replace with a production KMS provider before deploying.
    # https://developer.hashicorp.com/boundary/docs/configuration/kms/aead
    kms "aead" {
      purpose   = "root"
      aead_type = "aes-gcm"
      key       = "sP1fnF5Xz85RrXyELHFeZg9Ad2qt4Z4bgNHVGtD6sFo="
      key_id    = "global_root"
    }

    kms "aead" {
      purpose   = "recovery"
      aead_type = "aes-gcm"
      key       = "8fZBjCUfN0TzjEGLQldGY4+iE9AkOvCfjh7+p0GtRBQ="
      key_id    = "global_recovery"
    }

    kms "aead" {
      purpose   = "worker-auth"
      aead_type = "aes-gcm"
      key       = "ATTK2pMjMTEJGlAkUJAePnFMlNLQaXBnhSqJHVlJeKQ="
      key_id    = "global_worker-auth"
    }

    events {
      audit_enabled        = true
      sysevents_enabled    = true
      observations_enabled = true
      sink "stderr" {
        name = "all-events"
        description = "All events sent to stderr"
        event_types = ["*"]
        format = "hclog-text"
      }
    }

  livenessProbe:
    scheme: "" # Auto-derived from tls.disabled (HTTPS/HTTP). Override if needed.
    initialDelaySeconds: 60
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  readinessProbe:
    scheme: "" # Auto-derived from tls.disabled (HTTPS/HTTP). Override if needed.
    initialDelaySeconds: 15
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 5

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi

  service:
    api:
      type: LoadBalancer
      port: 9200
      targetPort: 9200
      annotations: {}
    cluster:
      type: ClusterIP
      port: 9201
      targetPort: 9201
      annotations: {}
    ops:
      type: ClusterIP
      port: 9203
      targetPort: 9203
      annotations: {}

database:
  init:
    enabled: false
  migrate:
    enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  repair:
    version: ""

bootstrapAdminAuthMethod:
  enabled: false
  runOnUpgrade: false
  waitTimeoutSeconds: 120
  authMethodName: "bootstrap-auth-method"
  userResourceName: "bootstrap-admin"
  accountResourceName: "bootstrap-admin"
  roleName: "bootstrap-global-admin"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
extraEnv: []

serviceAccount: # Chart does not create ServiceAccounts; provide an existing one.
  name: "default" # Quick start only — use a dedicated ServiceAccount in production.
  automountServiceAccountToken: false

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1

terminationGracePeriodSeconds: 15 # Should exceed graceful_shutdown_wait_duration in controller.config (default 10s).
