name: CI Validation and Test Pipeline
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/**'
      - 'scripts/**'
      - 'templates/**'
      - 'tests/**'
      - 'Chart.yaml'
      - 'Makefile'
      - 'values.schema.json'
      - 'values.yaml'
  workflow_dispatch:
    inputs:
      k8s_versions:
        description: "Optional explicit Kubernetes versions (comma-separated, e.g. v1.36.1,v1.35.5,v1.34.8)"
        required: false
        default: ""
  # push:
  #   branches: []

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RENDERED_TEMPLATES_RETENTION_DAYS: 1
  SECURITY_RESULTS_RETENTION_DAYS: 7
  TEST_IMAGE_TAG: 0.22-ent
  TEST_CPU_LIMIT: 500m
  TEST_MEMORY_LIMIT: 2Gi

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Helm
        run: make setup-helm

      - name: Setup Kubeconform
        run: make setup-kubeconform

      - name: Run Helm Lint & Kubernetes Validation
        run: make lint-helm-k8s

      - name: Upload rendered templates
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rendered-templates
          path: rendered.yaml
          retention-days: ${{ env.RENDERED_TEMPLATES_RETENTION_DAYS }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download rendered templates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: rendered-templates

      - name: Setup Trivy
        run: make setup-trivy

      - name: Run Trivy Security Scan
        run: make trivy-scan

      - name: Setup Kubescape
        run: make setup-kubescape

      - name: Run Kubescape Security Scan
        run: make kubescape-scan

      - name: Upload Kubescape results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kubescape-results
          path: kubescape-output.json
          retention-days: ${{ env.SECURITY_RESULTS_RETENTION_DAYS }}

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Print test job info
        run: |
          echo "================================"
          echo "Running Unit Tests"
          echo "================================"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "================================"

      - name: Setup Helm
        run: make setup-helm

      - name: Setup helm-unittest plugin
        run: make setup-helm-unittest

      - name: Run Unit Tests
        run: make unit-test

      - name: Helm Template (Dry Run)
        run: |
          echo "Running Helm template to validate chart rendering..."
          helm template boundary-controller . --debug
          echo ""
          echo "Helm template validation passed!"

      - name: Test with different values
        run: |
          echo "Testing chart with custom values..."
          helm template boundary-controller . \
            --set image.tag=$TEST_IMAGE_TAG \
            --set controller.resources.limits.cpu=$TEST_CPU_LIMIT \
            --set controller.resources.limits.memory=$TEST_MEMORY_LIMIT
          echo ""
          echo "Custom values test passed!"

      - name: Test Summary
        run: |
          echo "================================"
          echo "✅ All tests completed successfully!"
          echo "================================"

  chart-tests:
    name: Chart Tests
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    needs: [unit-test, security]
    env:
      BOUNDARY_LICENSE: ${{ secrets.BOUNDARY_LICENSE }}
      BOOTSTRAP_ADMIN_USERNAME: ${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}
      BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup acceptance environment
        run: make acceptance-setup

      - name: Install chart in smoke cluster
        run: make acceptance-helm

      - name: Run Helm chart test hooks
        run: make chart-test HELM_TEST_RELEASE=boundary-controller HELM_TEST_NAMESPACE=boundary HELM_TEST_KUBE_CONTEXT=kind-acceptance

      - name: Cleanup
        if: always()
        run: make acceptance-cleanup

  acceptance-matrix:
    name: Acceptance Matrix
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    needs: chart-tests
    outputs:
      versions: ${{ steps.resolve.outputs.versions }}
    steps:
      - name: Resolve configured Kubernetes versions
        id: resolve
        env:
          INPUT_K8S_VERSIONS: ${{ github.event.inputs.k8s_versions || '' }}
          REPO_K8S_MATRIX_VERSIONS: ${{ vars.K8S_MATRIX_VERSIONS }}
        run: |
          # Configure repository variables with ordered kindest/node tags.
          # Available tags: https://hub.docker.com/r/kindest/node
          raw_versions="${INPUT_K8S_VERSIONS:-${REPO_K8S_MATRIX_VERSIONS:-}}"
          normalized_versions="$(echo "${raw_versions}" | tr ',' ' ' | xargs)"
          if [ -z "${normalized_versions}" ]; then
            echo "K8S_MATRIX_VERSIONS repository variable is required when workflow_dispatch input k8s_versions is empty." >&2
            exit 1
          fi

          read -ra versions <<< "${normalized_versions}"

          json="["
          for version in "${versions[@]}"; do
            printf -v json '%s"%s",' "${json}" "${version}"
          done
          json="${json%,}]"

          echo "versions=${json}" >> "${GITHUB_OUTPUT}"
          echo "Resolved acceptance matrix: ${json}"

  acceptance-test:
    name: Acceptance Test (${{ matrix.k8s_version }})
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.base_ref == 'main' &&
       github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    needs: acceptance-matrix
    strategy:
      fail-fast: false
      matrix:
        k8s_version: ${{ fromJSON(needs.acceptance-matrix.outputs.versions) }}
    env:
      BOUNDARY_LICENSE: ${{ secrets.BOUNDARY_LICENSE }}
      BOOTSTRAP_ADMIN_USERNAME: ${{ secrets.BOOTSTRAP_ADMIN_USERNAME }}
      BOOTSTRAP_ADMIN_PASSWORD: ${{ secrets.BOOTSTRAP_ADMIN_PASSWORD }}
      K8S_VERSIONS: ${{ matrix.k8s_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup acceptance environment
        run: make acceptance-setup

      - name: Run Kubernetes acceptance test for selected version
        run: make kind-matrix-test

      - name: Cleanup
        if: always()
        run: make acceptance-cleanup

