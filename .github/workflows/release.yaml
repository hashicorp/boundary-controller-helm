name: Release Pipeline

on:
  push:
    tags:
      - 'v*.*.*'      # stable tags (for example: v1.2.3)
      - 'v*.*.*-*'    # prerelease tags (for example: v1.2.3-beta)

permissions:
  contents: write

jobs:
  update-helm-charts-index:
    name: update-helm-charts-index
    if: startsWith(github.ref, 'refs/tags/v') && github.ref_name != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: verify tag format
        run: |-
          tag="${{ github.ref_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "tag (${tag}) must match v<major>.<minor>.<patch> or v<major>.<minor>.<patch>-<prerelease>"
            exit 1
          fi

      - name: verify Chart version matches tag version
        run: |-
          export TAG=${{ github.ref_name }}
          git_tag="${TAG#v}"
          chart_tag=$(yq -r '.version' Chart.yaml)
          if [ "${git_tag}" != "${chart_tag}" ]; then
            echo "chart version (${chart_tag}) did not match git version (${git_tag})"
            exit 1
          fi

      - name: update helm-charts index
        id: update
        env:
          GH_TOKEN: ${{ secrets.HELM_CHARTS_GITHUB_TOKEN }}
        run: |-
          gh workflow run publish-charts.yml \
            --repo hashicorp/helm-charts \
            --ref main \
            -f SOURCE_TAG="${{ github.ref_name }}" \
            -f SOURCE_REPO="${{ github.repository }}"

      - name: create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          tag="${{ github.ref_name }}"
          repo="${{ github.repository }}"

          if gh release view "${tag}" --repo "${repo}" >/dev/null 2>&1; then
            if [[ "${tag}" == *-* ]]; then
              gh release edit "${tag}" --repo "${repo}" --title "${tag}" --prerelease
            else
              gh release edit "${tag}" --repo "${repo}" --title "${tag}"
            fi
            exit 0
          fi

          if [[ "${tag}" == *-* ]]; then
            gh release create "${tag}" --repo "${repo}" --title "${tag}" --generate-notes --prerelease
          else
            gh release create "${tag}" --repo "${repo}" --title "${tag}" --generate-notes
          fi
