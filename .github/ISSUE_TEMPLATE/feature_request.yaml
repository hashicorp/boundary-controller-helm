name: Feature Request
description: Suggest an idea to improve this project.
title: "feat: "
labels:
  - enhancement
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem are you trying to solve?
      placeholder: A clear and concise description of the pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternatives you have considered.
      placeholder: Other approaches or workarounds you evaluated.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add context, links, or screenshots that help explain the request.
